<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cc-manager</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>cc-manager</h1>
    <span id="lastUpdated">Loading...</span>
  </header>
  <main>
    <div class="card">
      <h2>Token Usage (7d)</h2>
      <canvas id="tokenChart"></canvas>
    </div>
    <div class="card">
      <h2>Cost Breakdown (7d)</h2>
      <canvas id="costChart"></canvas>
    </div>
    <div class="card">
      <div class="card-header">
        <h2>Installed Tools</h2>
      </div>
      <table id="toolsTable">
        <thead><tr><th>Tool</th><th>Version</th><th>Method</th><th>Status</th><th>ACTION</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="card">
      <div class="card-header">
        <h2>Health</h2>
        <button class="action-btn" onclick="runDoctor(this)">Re-scan</button>
      </div>
      <div id="healthPanel"></div>
    </div>
    <div class="card full-width">
      <h2>Recent Sessions</h2>
      <table id="sessionsTable">
        <thead><tr><th>Time</th><th>Model</th><th>Duration</th><th>Tokens</th><th>Cost</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="card full-width">
      <h2>Recommendations</h2>
      <div id="recommendPanel"></div>
    </div>
    <div class="card full-width" id="registryCard">
      <h2>Available Tools</h2>
      <div id="registryPanel"></div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
