name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Unit tests — fast, matrix of Python versions ─────────────────────────
  unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: pytest
        run: python -m pytest tests/ -q --tb=short

  # ── 2. TUI headless tests (Textual pilot, no TTY) ────────────────────────────
  tui:
    name: TUI Headless Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install -e ".[dev]"
          pip install anyio pytest-asyncio

      - name: Bootstrap Claude env
        run: |
          mkdir -p ~/.claude ~/.cc-manager/registry ~/.cc-manager/store \
                   ~/.cc-manager/backups ~/.cc-manager/state
          echo '{"version":"1.0.0","mcpServers":{},"hooks":{}}' > ~/.claude/settings.json

      - name: Run Textual pilot tests
        run: python -m pytest tests/test_app.py -v --tb=short --timeout=30

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tui-test-output
          path: /tmp/

  # ── 3. Hook dispatch tests (real hook.py, real store) ────────────────────────
  hooks:
    name: Hook Dispatch Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Bootstrap Claude env
        run: |
          mkdir -p ~/.claude ~/.cc-manager/registry ~/.cc-manager/store \
                   ~/.cc-manager/backups ~/.cc-manager/state
          echo '{"version":"1.0.0","mcpServers":{},"hooks":{}}' > ~/.claude/settings.json

      - name: ccm init (installs hook.py)
        run: ccm init --minimal --yes

      - name: Fire SessionStart hook directly
        run: |
          echo '{"session_id":"ci-001","cwd":"/tmp","model":"claude-sonnet-4-6"}' \
            | python3 ~/.cc-manager/hook.py SessionStart

      - name: Fire SessionEnd hook (records tokens + cost)
        run: |
          echo '{
            "session_id":"ci-001","model":"claude-sonnet-4-6",
            "usage":{"input_tokens":40000,"output_tokens":8000,"cache_read_input_tokens":10000},
            "duration_min":20
          }' | python3 ~/.cc-manager/hook.py SessionEnd

      - name: Fire Stop hook
        run: |
          echo '{"session_id":"ci-001"}' \
            | python3 ~/.cc-manager/hook.py Stop

      - name: Run full fake-claude lifecycle
        run: bash scripts/fake_claude.sh ci-lifecycle

      - name: Verify event store
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys
          store = pathlib.Path.home() / ".cc-manager/store/events.jsonl"
          if not store.exists():
              print("ERROR: store not found", file=sys.stderr); sys.exit(1)
          events = [json.loads(l) for l in store.read_text().splitlines() if l.strip()]
          types = {e["event"] for e in events}
          required = {"session_start", "session_end", "stop"}
          missing = required - types
          if missing:
              print(f"ERROR: missing event types: {missing}", file=sys.stderr); sys.exit(1)
          # Verify cost was computed
          ends = [e for e in events if e["event"] == "session_end"]
          assert any(e.get("cost_usd", 0) > 0 for e in ends), "session_end cost_usd is 0"
          print(f"OK: {len(events)} events, types={sorted(types)}")
          EOF

      - name: Verify dashboard sees sessions
        run: |
          python3 - <<'EOF'
          import cc_manager.context as ctx_mod
          ctx_mod._ctx = None
          from cc_manager.dashboard_data import build_data
          data = build_data(period_days=1)
          assert data["total_cost"] > 0, f"expected cost > 0, got {data['total_cost']}"
          assert len(data["sessions"]) > 0, f"expected sessions, got empty list"
          print(f"OK: {len(data['sessions'])} session(s), cost=${data['total_cost']:.4f}, status={data['status']}")
          EOF

  # ── 4. MCP install tests (no binary, just settings.json mutations) ────────────
  mcp-install:
    name: MCP Install / Uninstall
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Bootstrap Claude env
        run: |
          mkdir -p ~/.claude ~/.cc-manager/registry ~/.cc-manager/store \
                   ~/.cc-manager/backups ~/.cc-manager/state
          echo '{"version":"1.0.0","mcpServers":{},"hooks":{}}' > ~/.claude/settings.json

      - name: ccm init
        run: ccm init --minimal --yes

      - name: Install context7 (MCP — no binary required)
        run: ccm install context7

      - name: Verify context7 in mcpServers
        run: |
          python3 -c "
          import json, pathlib
          s = json.loads((pathlib.Path.home() / '.claude/settings.json').read_text())
          assert 'context7' in s.get('mcpServers', {}), f'context7 missing from mcpServers: {s}'
          print('context7 mcpServers entry verified')
          "

      - name: Install playwright-mcp
        run: ccm install playwright-mcp

      - name: ccm status shows installed tools
        run: ccm status | grep -i context7

      - name: Uninstall context7
        run: ccm uninstall context7

      - name: Verify context7 removed from installed.json
        run: |
          python3 -c "
          import json, pathlib
          reg = json.loads((pathlib.Path.home() / '.cc-manager/registry/installed.json').read_text())
          assert 'context7' not in reg.get('tools', {}), 'context7 still in installed.json after uninstall'
          print('context7 cleanly removed')
          "

      - name: Re-install is idempotent (should fail gracefully)
        run: |
          ccm install context7   # first install
          ! ccm install context7  # second should exit non-zero

  # ── 5. Cargo install — real binary install on Ubuntu + macOS ─────────────────
  cargo-install:
    name: Cargo Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/rtk
          key: ${{ runner.os }}-rtk-cargo

      - name: Install Node (for MCP npx tools)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cc-manager
        run: pip install -e ".[dev]"

      - name: Bootstrap Claude env
        run: |
          mkdir -p ~/.claude ~/.cc-manager/registry ~/.cc-manager/store \
                   ~/.cc-manager/backups ~/.cc-manager/state
          echo '{"version":"1.0.0","mcpServers":{},"hooks":{}}' > ~/.claude/settings.json

      - name: ccm init
        run: ccm init --minimal --yes

      - name: ccm install rtk (cargo)
        run: ccm install rtk

      - name: Verify rtk binary works
        run: rtk --version

      - name: Verify rtk in installed.json
        run: |
          python3 -c "
          import json, pathlib
          reg = json.loads((pathlib.Path.home() / '.cc-manager/registry/installed.json').read_text())
          assert 'rtk' in reg.get('tools', {}), 'rtk missing from installed.json'
          print('rtk install verified')
          "

      - name: ccm doctor detects rtk
        run: ccm doctor | grep -i rtk

      - name: ccm uninstall rtk
        run: ccm uninstall rtk

  # ── 6. Full Docker integration test ──────────────────────────────────────────
  docker-integration:
    name: Docker Integration
    runs-on: ubuntu-latest
    needs: [unit, tui, hooks, mcp-install]
    steps:
      - uses: actions/checkout@v4

      - name: Build integration image
        run: docker build -f Dockerfile.integration -t cc-manager-integration .

      - name: Run integration test suite in container
        run: |
          docker run --rm \
            -e CI=true \
            cc-manager-integration \
            bash /app/scripts/integration_test.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-integration-logs
          path: /tmp/
